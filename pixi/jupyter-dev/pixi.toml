torchaudio = ">=2.5.1, <3"
transformers = ">=4.48.3, <5"
mistral = ">=19.0.0, <20"
mistral-inference = ">=1.5.0, <2"
jupyterhub = ">=5.2.1, <6"
jupyter-ai = ">=2.29.1, <3"
jupyterlab = ">=4.3.5, <5"
