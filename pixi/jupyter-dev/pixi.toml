[project]
authors = ["atrawog <atrawog@gmail.com>"]
channels = ["conda-forge", "pytorch", "nvidia"]
description = "Add a short description here"
name = "jupyter-dev"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
jupyterhub = "python -m jupyterhub --config  /workspace/config/jupyterhub.py"
jupyterserver = "jupyter-server --config /workspace/config/jupyterserver.py"
jupyterbook = "python -m jupyter book start"

[dependencies]
python = "3.11.*"

[pypi-dependencies]
unsloth = { git = "https://github.com/unslothai/unsloth.git", extras = ["colab-new"] }
peft = ">=0.14.0, <0.15"
accelerate = ">=1.3.0, <2"
bitsandbytes = ">=0.45.2, <0.46"
torch = ">=2.5.1, <3"
