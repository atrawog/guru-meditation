[project]
authors = ["atrawog <atrawog@gmail.com>"]
channels = ["conda-forge", "pytorch", "nvidia"]
description = "Add a short description here"
name = "workspace"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.11.*"

[pypi-dependencies]
unsloth = { git = "https://github.com/unslothai/unsloth.git", extras = ["colab-new"] }
trl = ">=0.14.0, <0.15"
peft = ">=0.14.0, <0.15"
accelerate = ">=1.3.0, <2"
bitsandbytes = ">=0.45.2, <0.46"
vllm = ">=0.7.2, <0.8"
torch = ">=2.5.1, <3"
torchvision = ">=0.20.1, <0.21"
torchaudio = ">=2.5.1, <3"
transformers = ">=4.48.3, <5"
mistral = ">=19.0.0, <20"
mistral-inference = ">=1.5.0, <2"
jupyterhub = ">=5.2.1, <6"
jupyter-ai = ">=2.29.1, <3"
jupyterlab = ">=4.3.5, <5"
mystmd = ">=1.3.23, <2"
jupyter-ai-magics = ">=2.29.1, <3"
jupyter-book = ">=1.0.3, <2"
jupyterlab-myst = ">=2.4.2, <3"
langchain-ollama = ">=0.2.3, <0.3"
ollama = ">=0.4.7, <0.5"
xformers = ">=0.0.28.post3, <0.0.29"
ansible = ">=11.2.0, <12"
ansible-runner = ">=2.4.0, <3"
libvirt-python = ">=11.0.0, <12"
huggingface-hub = ">=0.28.1, <0.29"
altair = ">=5.5.0, <6"
numpy = ">=1.26.4, <2"
pandas = ">=2.2.3, <3"
geopandas = ">=1.0.1, <2"
kubernetes = ">=32.0.0, <33"
nbdev = ">=2.3.34, <3"
papermill = ">=2.6.0, <3"
fastapi = ">=0.115.8, <0.116"
configurable-http-proxy = ">=0.3.0, <0.4"


[tasks]
jupyterhub = "python -m jupyterhub --config  /workspace/config/jupyterhub_config.py"
jupyterbook = "python -m jupyter book start"
